<!DOCTYPE html>
<html>
<head>
    <title>{{ formula.name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .top-bar{
            background:#212529;
            padding:15px;
        }

        .top-bar a{
            color:white;
            text-decoration:none;
            margin-right:15px;
            font-weight:bold;
        }

        .box{
            width:500px;
            margin:40px auto;
            background:white;
            border:1px solid #ccc;
            padding:20px;
            border-radius:10px;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }

        .result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:green;
        }

        .formula-box{
            background:#f4f4f4;
            padding:10px;
            margin-bottom:20px;
            border-radius:5px;
        }

    </style>
</head>

<body>

<!-- TOP NAVBAR -->
<div class="top-bar">

    <a href="/">Home</a>

    <a href="/history">History</a>

    <a href="/create-formula">Create Formula</a>

</div>

<div class="box">

    <h1>{{ formula.name }}</h1>

    <p>{{ formula.description }}</p>

    <div class="formula-box">
        <strong>Formula:</strong>
        {{ formula.expression }}
    </div>

    <label>
        Select Unit System
    </label>

    <select id="unit_system">

        {% set first_var = variables[0] %}

        {% set systems = first_var.available_units.split(',') %}

        {% for system in systems %}

            <option value="{{ system }}">
                {{ system.replace('|', ' & ') }}
            </option>

        {% endfor %}

    </select>

    <hr>

    {% for var in variables %}

        <label>{{ var.display_name }}</label>

        <input
            type="number"
            id="value_{{ var.variable_name }}"
            placeholder="Enter {{ var.display_name }}"
        >

    {% endfor %}

    <button
        class="btn btn-primary"
        onclick="calculateFormula()"
    >
        Calculate
    </button>

    <div class="result" id="result"></div>

</div>

<script>

async function calculateFormula(){

    let values = {}

    let selectedSystem =
        document.getElementById(
            'unit_system'
        ).value

    let units = selectedSystem.split('|')

    let index = 0

    {% for var in variables %}

    values["{{ var.variable_name }}"] = {

        value: document.getElementById(
            "value_{{ var.variable_name }}"
        ).value,

        unit: units[index]
    }

    index++

    {% endfor %}

    console.log(values)

    const response = await fetch('/api/calculate', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({

            formula_id: {{ formula.id }},

            values: values
        })
    })

    const data = await response.json()

    console.log(data)

    // ERROR HANDLE
    if(data.success === false){

        document.getElementById('result').innerHTML =
            "Error : " + data.error

        return
    }

    // SUCCESS
    document.getElementById('result').innerHTML =
        "Answer = " + data.answer.value
}

</script>

</body>
</html>
